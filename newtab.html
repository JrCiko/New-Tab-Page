<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOMUTA MERKEZİ</title>
<style>
  :root {
    --bg: #070a0f;
    --panel: #0e131c;
    --panel-2: #131a26;
    --panel-border: #1d2735;
    --accent: #d4a24e;
    --accent-bright: #f0c06a;
    --accent-dim: #7a5f2e;
    --text: #c9d1d9;
    --text-dim: #56657a;
    --glow: rgba(212,162,78,0.18);
    --grid: rgba(120,160,210,0.035);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Consolas', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .bg-grid {
    position: fixed;
    inset: -50%;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 44px 44px;
    animation: drift 60s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translate(0,0); }
    to   { transform: translate(44px,44px); }
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(212,162,78,0.06), transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(60,110,180,0.05), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(transparent 50%, rgba(0,0,0,0.045) 50%);
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 50;
  }

  .topbar, .bottombar { position: relative; z-index: 10; }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid var(--panel-border);
    background: rgba(14,19,28,0.55);
    backdrop-filter: blur(6px);
  }
  .sys-label {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 12px var(--glow);
  }
  .sys-label .blink { animation: blink 1.3s steps(2) infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .sys-status { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
  .sys-status b { color: #5fbf7f; text-shadow: 0 0 10px rgba(95,191,127,0.4); }

  /* Hava durumu paneli */
  .weather {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    position: relative;
    overflow: hidden;
    min-width: 200px;
  }
  .weather::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .weather .w-ico {
    font-size: 26px;
    line-height: 1;
    filter: drop-shadow(0 0 8px var(--glow));
    animation: floaty 4s ease-in-out infinite;
  }
  @keyframes floaty {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-3px); }
  }
  .weather .w-main { display: flex; flex-direction: column; gap: 2px; }
  .weather .w-temp {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1;
    text-shadow: 0 0 14px var(--glow);
  }
  .weather .w-temp small { font-size: 12px; color: var(--accent); }
  .weather .w-desc {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .weather .w-meta {
    margin-left: 6px;
    padding-left: 12px;
    border-left: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .weather .w-meta span b { color: var(--accent); font-weight: 700; }
  .weather.loading .w-temp { color: var(--text-dim); }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 40px 24px;
    position: relative;
    z-index: 10;
  }

  .clock-block { text-align: center; position: relative; }
  .clock {
    font-size: 92px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 30px var(--glow);
    animation: pulseGlow 4s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%,100% { text-shadow: 0 0 28px rgba(212,162,78,0.14); }
    50%     { text-shadow: 0 0 44px rgba(212,162,78,0.30); }
  }
  .clock .sec {
    color: var(--accent);
    font-size: 50px;
    text-shadow: 0 0 24px var(--glow);
  }
  .date {
    margin-top: 14px;
    font-size: 14px;
    letter-spacing: 5px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .scanline-deco {
    margin: 18px auto 0;
    width: 220px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    position: relative;
  }
  .scanline-deco::before {
    content: "";
    position: absolute; top: -1px; left: 0;
    width: 40px; height: 3px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: sweep 3.5s ease-in-out infinite;
  }
  @keyframes sweep {
    0%,100% { left: 0; opacity: .3; }
    50%     { left: calc(100% - 40px); opacity: 1; }
  }

  .links {
    display: grid;
    grid-template-columns: repeat(4, minmax(150px, 180px));
    gap: 18px;
    width: 100%;
    max-width: 820px;
    perspective: 900px;
  }
  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform .25s cubic-bezier(.2,.8,.2,1),
                border-color .25s, background .25s, box-shadow .25s;
    transform-style: preserve-3d;
    will-change: transform;
  }
  .link::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform .25s;
  }
  .link::after {
    content: "";
    position: absolute;
    top: 0; left: -120%;
    width: 80%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(240,192,106,0.10), transparent);
    transition: left .5s;
  }
  .link:hover {
    border-color: var(--accent-dim);
    background: var(--panel-2);
    box-shadow: 0 12px 30px rgba(0,0,0,0.5), 0 0 24px rgba(212,162,78,0.10);
  }
  .link:hover::before { transform: scaleY(1); }
  .link:hover::after  { left: 130%; }

  .link .ico {
    font-size: 22px;
    width: 26px; text-align: center;
    color: var(--accent);
    transition: transform .25s, text-shadow .25s;
  }
  .link:hover .ico {
    text-shadow: 0 0 16px var(--glow);
    transform: scale(1.15);
  }
  .link .meta { display: flex; flex-direction: column; gap: 2px; }
  .link .name { font-size: 14px; letter-spacing: 1.5px; }
  .link .sub  { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }

  .bottombar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 32px;
    border-top: 1px solid var(--panel-border);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    background: rgba(14,19,28,0.4);
  }
  .quote { color: var(--accent-dim); font-style: italic; }

  @media (max-width: 820px) {
    .topbar { flex-wrap: wrap; gap: 12px; }
    .clock { font-size: 60px; }
    .clock .sec { font-size: 32px; }
    .links { grid-template-columns: repeat(2, 1fr); max-width: 420px; }
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="topbar">
    <div class="sys-label">◆ KOMUTA MERKEZİ<span class="blink">_</span></div>
    <div class="topbar-right">
      <div class="weather loading" id="weather">
        <span class="w-ico" id="w-ico">◌</span>
        <div class="w-main">
          <span class="w-temp" id="w-temp">--<small>°C</small></span>
          <span class="w-desc" id="w-desc">YÜKLENİYOR</span>
        </div>
        <div class="w-meta">
          <span>HİS <b id="w-feels">--°</b></span>
          <span>NEM <b id="w-hum">--%</b></span>
        </div>
      </div>
      <div class="sys-status">SİSTEM: <b>ÇEVRİMİÇİ</b></div>
    </div>
  </div>

  <div class="main">
    <div class="clock-block">
      <div class="clock" id="clock">--:--<span class="sec">00</span></div>
      <div class="date" id="date">YÜKLENİYOR</div>
      <div class="scanline-deco"></div>
    </div>

    <div class="links" id="links"></div>
  </div>

  <div class="bottombar">
    <div id="greeting">HOŞ GELDİN, KOMUTAN</div>
    <div class="quote" id="quote"></div>
  </div>

<script>
  const LINKS = [
    { name: "DÜNE DAİR", sub: "platform", ico: "📰", url: "https://dunedair.com" },
    { name: "GITHUB",    sub: "kod",      ico: "⌥",  url: "https://github.com/JrCiko?tab=repositories" },
    { name: "YOUTUBE",   sub: "video",    ico: "▶",  url: "https://youtube.com" },
    { name: "GMAIL",     sub: "posta",    ico: "✉",  url: "https://mail.google.com" },
    { name: "EDX",       sub: "astro",    ico: "🛰", url: "https://home.edx.org/" },
    { name: "CLAUDE",    sub: "ai",       ico: "◈",  url: "https://claude.ai" },
    { name: "GEMINI",    sub: "ai",       ico: "✦",  url: "https://gemini.google.com" },
    { name: "STEAM",     sub: "oyun",     ico: "⚙",  url: "https://store.steampowered.com" },
  ];

  const QUOTES = [
    "Plan, ilk temasta hayatta kalmaz.",
    "Her tur bir karardır.",
    "Disiplin, motivasyondan üstündür.",
    "Sabır da bir silahtır.",
    "Önce hesapla, sonra at.",
    "Cephe sessizse bir şeyler hazırlanıyordur.",
  ];

  const DAYS = ["PAZAR","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ"];
  const MONTHS = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
  const pad = n => n.toString().padStart(2,"0");

  function tick(){
    const d = new Date();
    document.getElementById("clock").innerHTML =
      `${pad(d.getHours())}:${pad(d.getMinutes())}<span class="sec">${pad(d.getSeconds())}</span>`;
    document.getElementById("date").textContent =
      `${DAYS[d.getDay()]} · ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);

  (function(){
    const h = new Date().getHours();
    let g = "İYİ GECELER";
    if (h>=5 && h<12) g = "GÜNAYDIN";
    else if (h>=12 && h<18) g = "İYİ GÜNLER";
    else if (h>=18 && h<22) g = "İYİ AKŞAMLAR";
    document.getElementById("greeting").textContent = `${g}, KOMUTAN`;
  })();

  document.getElementById("quote").textContent =
    "» " + QUOTES[Math.floor(Math.random()*QUOTES.length)];

  const wrap = document.getElementById("links");
  LINKS.forEach(l => {
    const a = document.createElement("a");
    a.className = "link";
    a.href = l.url;
    a.innerHTML = `<span class="ico">${l.ico}</span>
      <span class="meta"><span class="name">${l.name}</span>
      <span class="sub">${l.sub}</span></span>`;
    wrap.appendChild(a);
  });

  document.querySelectorAll(".link").forEach(card => {
    card.addEventListener("mousemove", e => {
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width  - 0.5;
      const py = (e.clientY - r.top)  / r.height - 0.5;
      card.style.transform =
        `translateY(-3px) rotateX(${(-py*8).toFixed(2)}deg) rotateY(${(px*10).toFixed(2)}deg)`;
    });
    card.addEventListener("mouseleave", () => { card.style.transform = ""; });
  });

  // --------- HAVA DURUMU (Open-Meteo, anahtarsız) ----------
  // WMO hava kodu -> { ikon, açıklama }
  function wmo(code, isDay){
    const map = {
      0:  [isDay ? "☀" : "🌙", "AÇIK"],
      1:  [isDay ? "🌤" : "🌙", "AZ BULUTLU"],
      2:  ["⛅", "PARÇALI BULUTLU"],
      3:  ["☁", "KAPALI"],
      45: ["🌫", "SİSLİ"],
      48: ["🌫", "KIRAĞILI SİS"],
      51: ["🌦", "ÇİSELİYOR"],
      53: ["🌦", "ÇİSELİYOR"],
      55: ["🌧", "YOĞUN ÇİSE"],
      61: ["🌦", "HAFİF YAĞMUR"],
      63: ["🌧", "YAĞMURLU"],
      65: ["🌧", "ŞİDDETLİ YAĞMUR"],
      66: ["🌧", "DONAN YAĞMUR"],
      67: ["🌧", "DONAN YAĞMUR"],
      71: ["🌨", "HAFİF KAR"],
      73: ["🌨", "KAR YAĞIŞI"],
      75: ["❄", "YOĞUN KAR"],
      77: ["🌨", "KAR TANESİ"],
      80: ["🌦", "SAĞANAK"],
      81: ["🌧", "SAĞANAK"],
      82: ["⛈", "ŞİDDETLİ SAĞANAK"],
      85: ["🌨", "KAR SAĞANAĞI"],
      86: ["❄", "KAR SAĞANAĞI"],
      95: ["⛈", "GÖK GÜRÜLTÜLÜ"],
      96: ["⛈", "DOLULU FIRTINA"],
      99: ["⛈", "DOLULU FIRTINA"],
    };
    return map[code] || ["◌", "BİLİNMİYOR"];
  }

  async function loadWeather(){
    const url = "https://api.open-meteo.com/v1/forecast"
      + "?latitude=39.9334&longitude=32.8597"
      + "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,is_day"
      + "&timezone=Europe/Istanbul";
    try {
      const res = await fetch(url);
      const data = await res.json();
      const c = data.current;
      const [ico, desc] = wmo(c.weather_code, c.is_day === 1);

      document.getElementById("w-ico").textContent  = ico;
      document.getElementById("w-temp").innerHTML   = Math.round(c.temperature_2m) + '<small>°C</small>';
      document.getElementById("w-desc").textContent = desc;
      document.getElementById("w-feels").textContent = Math.round(c.apparent_temperature) + "°";
      document.getElementById("w-hum").textContent   = Math.round(c.relative_humidity_2m) + "%";
      document.getElementById("weather").classList.remove("loading");
    } catch (e) {
      document.getElementById("w-desc").textContent = "VERİ YOK";
      document.getElementById("w-ico").textContent  = "⚠";
    }
  }
  loadWeather();
  setInterval(loadWeather, 15 * 60 * 1000); // 15 dakikada bir güncelle
</script>
</body>
</html>
